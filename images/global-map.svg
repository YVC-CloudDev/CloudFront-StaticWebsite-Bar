<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- World map simplified -->
  <ellipse cx="200" cy="125" rx="170" ry="100" fill="#f0f4ff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Continents (simplified blobs) -->
  <!-- North America -->
  <ellipse cx="100" cy="80" rx="35" ry="25" fill="#3b82f6" opacity="0.12"/>
  <!-- South America -->
  <ellipse cx="120" cy="150" rx="20" ry="30" fill="#3b82f6" opacity="0.12"/>
  <!-- Europe -->
  <ellipse cx="210" cy="70" rx="25" ry="18" fill="#8b5cf6" opacity="0.12"/>
  <!-- Africa -->
  <ellipse cx="220" cy="130" rx="22" ry="30" fill="#8b5cf6" opacity="0.12"/>
  <!-- Asia -->
  <ellipse cx="290" cy="80" rx="40" ry="28" fill="#22c55e" opacity="0.12"/>
  <!-- Australia -->
  <ellipse cx="310" cy="160" rx="18" ry="14" fill="#22c55e" opacity="0.12"/>

  <!-- Connection dots -->
  <circle cx="95" cy="78" r="5" fill="#3b82f6"/><circle cx="95" cy="78" r="9" fill="#3b82f6" opacity="0.2"/>
  <circle cx="205" cy="68" r="5" fill="#8b5cf6"/><circle cx="205" cy="68" r="9" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="280" cy="85" r="5" fill="#22c55e"/><circle cx="280" cy="85" r="9" fill="#22c55e" opacity="0.2"/>
  <circle cx="120" cy="145" r="4" fill="#f59e0b"/><circle cx="120" cy="145" r="7" fill="#f59e0b" opacity="0.2"/>
  <circle cx="310" cy="155" r="4" fill="#ef4444"/><circle cx="310" cy="155" r="7" fill="#ef4444" opacity="0.2"/>
  <circle cx="225" cy="125" r="4" fill="#3b82f6"/><circle cx="225" cy="125" r="7" fill="#3b82f6" opacity="0.2"/>

  <!-- Connecting lines -->
  <line x1="95" y1="78" x2="205" y2="68" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="205" y1="68" x2="280" y2="85" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="95" y1="78" x2="120" y2="145" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="280" y1="85" x2="310" y2="155" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3"/>
  <line x1="205" y1="68" x2="225" y2="125" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3"/>

  <!-- Label -->
  <rect x="140" y="210" width="120" height="24" rx="12" fill="white" stroke="#e2e8f0"/>
  <text x="200" y="226" text-anchor="middle" font-size="11" fill="#475569" font-family="system-ui">🌍 15+ Countries</text>
</svg>
