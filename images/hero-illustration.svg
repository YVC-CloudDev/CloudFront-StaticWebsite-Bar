<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none">
  <!-- Background circles -->
  <circle cx="240" cy="200" r="160" fill="#f0f4ff" opacity="0.5"/>
  <circle cx="240" cy="200" r="120" fill="#e8e0ff" opacity="0.3"/>

  <!-- Monitor -->
  <rect x="120" y="80" width="240" height="160" rx="12" fill="#1e293b"/>
  <rect x="132" y="92" width="216" height="136" rx="4" fill="#0f172a"/>

  <!-- Screen content - workflow visualization -->
  <rect x="148" y="108" width="80" height="12" rx="3" fill="#3b82f6" opacity="0.8"/>
  <rect x="148" y="128" width="120" height="8" rx="2" fill="#475569"/>
  <rect x="148" y="144" width="100" height="8" rx="2" fill="#475569"/>

  <!-- Workflow nodes -->
  <circle cx="170" cy="178" r="12" fill="#22c55e" opacity="0.9"/>
  <path d="M165 178l3 3 7-7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="182" y1="178" x2="210" y2="178" stroke="#475569" stroke-width="2"/>
  <circle cx="222" cy="178" r="12" fill="#3b82f6" opacity="0.9"/>
  <path d="M218 175v6m3-3h-6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="234" y1="178" x2="262" y2="178" stroke="#475569" stroke-width="2"/>
  <circle cx="274" cy="178" r="12" fill="#8b5cf6" opacity="0.9"/>
  <path d="M270 178l4 4m0-8l-4 4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="286" y1="178" x2="314" y2="178" stroke="#475569" stroke-width="2"/>
  <circle cx="326" cy="178" r="12" fill="#f59e0b" opacity="0.9"/>
  <path d="M322 178l4-4m0 0v8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Terminal line -->
  <rect x="148" y="200" width="8" height="10" rx="1" fill="#22c55e" opacity="0.8"/>
  <rect x="160" y="202" width="60" height="6" rx="1" fill="#475569" opacity="0.5"/>

  <!-- Monitor stand -->
  <rect x="215" y="240" width="50" height="8" rx="2" fill="#334155"/>
  <rect x="200" y="248" width="80" height="6" rx="3" fill="#475569"/>

  <!-- Floating elements -->
  <!-- Git branch icon -->
  <g transform="translate(80, 120)">
    <rect width="48" height="48" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="18" cy="18" r="4" fill="#8b5cf6"/>
    <circle cx="30" cy="18" r="4" fill="#8b5cf6"/>
    <circle cx="24" cy="32" r="4" fill="#8b5cf6"/>
    <line x1="18" y1="22" x2="24" y2="28" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="30" y1="22" x2="24" y2="28" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Rocket icon -->
  <g transform="translate(355, 100)">
    <rect width="48" height="48" rx="12" fill="white" filter="url(#shadow)"/>
    <path d="M24 14c-6 6-8 14-8 18l5-3 3 3 3-3 5 3c0-4-2-12-8-18z" fill="#3b82f6"/>
    <circle cx="24" cy="24" r="3" fill="white"/>
    <path d="M18 30l-3 4m17-4l3 4" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Check badge -->
  <g transform="translate(90, 240)">
    <rect width="44" height="44" rx="11" fill="white" filter="url(#shadow)"/>
    <circle cx="22" cy="22" r="12" fill="#22c55e"/>
    <path d="M17 22l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Gear icon -->
  <g transform="translate(350, 230)">
    <rect width="44" height="44" rx="11" fill="white" filter="url(#shadow)"/>
    <circle cx="22" cy="22" r="7" fill="none" stroke="#2563eb" stroke-width="2"/>
    <circle cx="22" cy="22" r="3" fill="#2563eb"/>
    <g stroke="#2563eb" stroke-width="2" stroke-linecap="round">
      <line x1="22" y1="11" x2="22" y2="14"/>
      <line x1="22" y1="30" x2="22" y2="33"/>
      <line x1="11" y1="22" x2="14" y2="22"/>
      <line x1="30" y1="22" x2="33" y2="22"/>
    </g>
  </g>

  <defs>
    <filter id="shadow" x="-4" y="-2" width="56" height="56">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>
