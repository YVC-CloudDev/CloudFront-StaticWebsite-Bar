<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Staging env -->
  <rect x="40" y="60" width="100" height="60" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="85" text-anchor="middle" font-size="11" fill="#f59e0b" font-family="system-ui" font-weight="600">Staging</text>
  <rect x="60" y="95" width="60" height="6" rx="2" fill="#f59e0b" opacity="0.2"/>
  <!-- Arrow -->
  <path d="M150 90h20m-6-6l6 6-6 6" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Approval gate -->
  <circle cx="160" cy="90" r="14" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="94" text-anchor="middle" font-size="12" fill="#8b5cf6">✓</text>
  <!-- Arrow -->
  <path d="M174" y1="90" x2="194" y2="90" stroke="#475569" stroke-width="2"/>
  <!-- Production env -->
  <rect x="180" y="60" width="100" height="60" rx="8" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="85" text-anchor="middle" font-size="11" fill="#22c55e" font-family="system-ui" font-weight="600">Production</text>
  <rect x="200" y="95" width="60" height="6" rx="2" fill="#22c55e" opacity="0.2"/>
  <!-- Notification bell -->
  <rect x="120" y="140" width="80" height="28" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="160" y="158" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">🔔 Notify Team</text>
</svg>
