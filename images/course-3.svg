  <path d="M242 86l5 5 10-10" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Bottom status bar -->
  <rect x="50" y="150" width="220" height="24" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="70" cy="162" r="5" fill="#22c55e"/>
  <rect x="82" y="159" width="60" height="6" rx="2" fill="#e2e8f0"/>
  <rect x="220" y="159" width="40" height="6" rx="2" fill="#22c55e" opacity="0.3"/>
