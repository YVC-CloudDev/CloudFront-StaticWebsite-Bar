<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Pipeline arrows -->
  <circle cx="70" cy="100" r="28" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="105" text-anchor="middle" font-size="11" fill="#3b82f6" font-family="system-ui" font-weight="600">Build</text>
  <line x1="98" y1="100" x2="122" y2="100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="160" cy="100" r="28" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="105" text-anchor="middle" font-size="11" fill="#8b5cf6" font-family="system-ui" font-weight="600">Test</text>
  <line x1="188" y1="100" x2="212" y2="100" stroke="#8b5cf6" stroke-width="2"/>

  <circle cx="250" cy="100" r="28" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" font-size="11" fill="#22c55e" font-family="system-ui" font-weight="600">Deploy</text>

  <!-- Check marks -->
  <path d="M62 86l5 5 10-10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" fill="none"/>
