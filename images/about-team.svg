<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#f8fafc"/>
  <!-- People working together -->
  <circle cx="120" cy="180" r="30" fill="#dbeafe"/>
  <circle cx="120" cy="160" r="16" fill="#3b82f6"/>
  <ellipse cx="120" cy="200" rx="22" ry="14" fill="#3b82f6" opacity="0.6"/>

  <circle cx="200" cy="170" r="30" fill="#ede9fe"/>
  <circle cx="200" cy="150" r="16" fill="#8b5cf6"/>
  <ellipse cx="200" cy="190" rx="22" ry="14" fill="#8b5cf6" opacity="0.6"/>

  <circle cx="280" cy="180" r="30" fill="#dcfce7"/>
  <circle cx="280" cy="160" r="16" fill="#22c55e"/>
  <ellipse cx="280" cy="200" rx="22" ry="14" fill="#22c55e" opacity="0.6"/>

  <!-- Connecting lines -->
  <line x1="142" y1="170" x2="178" y2="160" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4"/>
  <line x1="222" y1="160" x2="258" y2="170" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4"/>

  <!-- Laptop screens -->
  <rect x="90" y="220" width="60" height="36" rx="4" fill="#1e293b"/>
  <rect x="94" y="224" width="52" height="28" rx="2" fill="#0f172a"/>
  <rect x="100" y="230" width="20" height="3" rx="1" fill="#3b82f6" opacity="0.6"/>
  <rect x="100" y="236" width="30" height="2" rx="1" fill="#475569"/>
  <rect x="100" y="241" width="25" height="2" rx="1" fill="#475569"/>

  <rect x="170" y="210" width="60" height="36" rx="4" fill="#1e293b"/>
  <rect x="174" y="214" width="52" height="28" rx="2" fill="#0f172a"/>
  <rect x="180" y="220" width="20" height="3" rx="1" fill="#8b5cf6" opacity="0.6"/>
  <rect x="180" y="226" width="30" height="2" rx="1" fill="#475569"/>

  <rect x="250" y="220" width="60" height="36" rx="4" fill="#1e293b"/>
  <rect x="254" y="224" width="52" height="28" rx="2" fill="#0f172a"/>
  <rect x="260" y="230" width="20" height="3" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="260" y="236" width="30" height="2" rx="1" fill="#475569"/>

  <!-- Cloud / CI indicator at top -->
  <ellipse cx="200" cy="60" rx="50" ry="25" fill="#f0f4ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="65" text-anchor="middle" font-size="14" font-family="system-ui" fill="#3b82f6" font-weight="600">CI/CD</text>

  <!-- Arrows from cloud to laptops -->
  <line x1="180" y1="85" x2="120" y2="130" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <line x1="200" y1="85" x2="200" y2="130" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <line x1="220" y1="85" x2="280" y2="130" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
</svg>
