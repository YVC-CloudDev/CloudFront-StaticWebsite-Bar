<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Monorepo folders -->
  <rect x="40" y="30" width="70" height="140" rx="6" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="55" text-anchor="middle" font-size="10" fill="#3b82f6" font-family="system-ui" font-weight="600">pkg-a</text>
  <rect x="55" y="65" width="40" height="4" rx="1" fill="#3b82f6" opacity="0.3"/>
  <rect x="55" y="75" width="30" height="4" rx="1" fill="#3b82f6" opacity="0.3"/>
  <circle cx="75" cy="100" r="12" fill="#22c55e" opacity="0.2"/><text x="75" y="104" text-anchor="middle" font-size="10" fill="#22c55e">✓</text>

  <rect x="125" y="30" width="70" height="140" rx="6" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="55" text-anchor="middle" font-size="10" fill="#8b5cf6" font-family="system-ui" font-weight="600">pkg-b</text>
  <rect x="140" y="65" width="40" height="4" rx="1" fill="#8b5cf6" opacity="0.3"/>
  <rect x="140" y="75" width="30" height="4" rx="1" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="160" cy="100" r="12" fill="#f59e0b" opacity="0.2"/><text x="160" y="104" text-anchor="middle" font-size="10" fill="#f59e0b">⟳</text>

  <rect x="210" y="30" width="70" height="140" rx="6" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1.5"/>
  <text x="245" y="55" text-anchor="middle" font-size="10" fill="#22c55e" font-family="system-ui" font-weight="600">pkg-c</text>
  <rect x="225" y="65" width="40" height="4" rx="1" fill="#22c55e" opacity="0.3"/>
  <rect x="225" y="75" width="30" height="4" rx="1" fill="#22c55e" opacity="0.3"/>
  <circle cx="245" cy="100" r="12" fill="#94a3b8" opacity="0.2"/><text x="245" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">—</text>

  <!-- Matrix label -->
  <rect x="90" y="140" width="140" height="22" rx="11" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="160" y="155" text-anchor="middle" font-size="10" fill="#475569" font-family="system-ui">Matrix: 3 packages × 2 OS</text>
</svg>
