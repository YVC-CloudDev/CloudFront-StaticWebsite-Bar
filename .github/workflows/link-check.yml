name: Scheduled Link Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check external links
        run: |
          echo "🔗 Checking external links in all HTML files..."
          echo ""
          
          errors=0
          checked=0
          
          for file in *.html; do
            urls=$(grep -oP 'https?://[^"'"'"'<>\s]+' "$file" 2>/dev/null || true)
            for url in $urls; do
              checked=$((checked + 1))
              status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
              if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
                echo "  ✅ [$status] $url"
              else
                echo "  ❌ [$status] $url (in $file)"
                errors=$((errors + 1))
              fi
            done
          done
          
          echo ""
          echo "Checked $checked links, found $errors errors"
          
          if [ "$errors" -gt 0 ]; then
            echo "⚠️ Some links may be broken. Please review."
          fi
